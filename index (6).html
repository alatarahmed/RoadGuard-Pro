<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadGuard Pro | Eng. Ahmed Hany Elattar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #00d2ff; 
            --danger: #ff4b2b; 
            --warning: #ffd700;
            --success: #00ff88;
            --bg: #050a14; 
            --glass: rgba(15, 23, 42, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #0f172a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .dev-tag { color: var(--primary); font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; }

        .dashboard { display: grid; grid-template-columns: 350px 1fr; flex: 1; overflow: hidden; }

        .sidebar { background: var(--glass); padding: 25px; display: flex; flex-direction: column; gap: 15px; border-left: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 10; }

        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); border-right: 4px solid var(--primary); transition: 0.3s; }
        .speed-display { font-size: 3rem; font-weight: 900; color: var(--primary); text-align: center; }
        
        .btn { background: linear-gradient(135deg, var(--primary), #3a7bd5); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-family: 'Cairo'; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px;}
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); color: var(--primary); }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        #map { width: 100%; height: 100%; background: #0b111d; }

        /* نبض الخطر - Pulse Effect */
        @keyframes pulse {
            0% { r: 500; opacity: 0.6; }
            100% { r: 1500; opacity: 0; }
        }
        .pulse-circle { animation: pulse 2s infinite; stroke: none; fill: var(--danger); }

        .flash-red { animation: flash-screen 0.5s infinite alternate; }
        @keyframes flash-screen { from { box-shadow: inset 0 0 0px transparent; } to { box-shadow: inset 0 0 60px rgba(255, 75, 43, 0.2); } }
    </style>
</head>
<body id="mainBody">

    <header>
        <div style="font-weight:900;">ROADGUARD GPS <span style="color:var(--primary)">V3.0</span></div>
        <div class="dev-tag">DESIGNER: AHMED HANY ELATTAR</div>
    </header>

    <div class="dashboard">
        <div class="sidebar">
            <div class="card">
                <div style="font-size:0.75rem; color:#94a3b8; text-align:center;">السرعة الحالية</div>
                <div class="speed-display" id="spNum">0</div>
            </div>

            <div class="card">
                <div style="font-size:0.75rem; color:#94a3b8;"><i class="fas fa-crosshairs"></i> تتبع المسافة</div>
                <div id="locName" style="color:var(--primary); font-weight:bold; font-size: 1rem; margin-top:5px;">--</div>
                <div id="distNum" style="font-size:1.2rem; font-weight: 900; margin-top: 5px;">0 متر</div>
            </div>

            <div style="margin-top:10px; display: flex; flex-direction: column; gap: 8px;">
                <button class="btn" onclick="startSim('belbeis')"><i class="fas fa-route"></i> طريق بلبيس</button>
                <button class="btn" style="filter:hue-rotate(220deg)" onclick="startSim('faqous')"><i class="fas fa-road"></i> طريق فاقوس</button>
                <button class="btn btn-secondary" onclick="generateReport()"><i class="fas fa-file-invoice"></i> استخراج تقرير الحادث</button>
            </div>

            <div style="margin-top:auto; font-size:0.7rem; color:#64748b; text-align:center;">
                &copy; 2026 Developed for Graduation Project<br>
                <b style="color:var(--primary)">Ahmed Hany Elattar</b>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const alertAudio = new Audio('https://translate.google.com/translate_tts?ie=UTF-8&q=%D8%A7%D9%86%D8%AA%D8%A8%D9%87%20%D9%85%D9%86%D8%B7%D9%82%D8%A9%20%D8%AE%D8%B7%D8%B1&tl=ar&client=tw-ob');
        let lastPlay = 0;
        let dangerCount = 0; // لحساب عدد مرات دخول منطقة الخطر للتقرير

        const map = L.map('map', { zoomControl: false }).setView([30.5, 31.7], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const spots = [
            { name: "ميدان الطيارة", lat: 30.370580, lng: 31.560652, r: 1000 },
            { name: "تقاطع الروبيكي", lat: 30.319318, lng: 31.656503, r: 900 },
            { name: "منحنى العاشر", lat: 30.242886, lng: 31.718091, r: 800 },
            { name: "كوبري فاقوس", lat: 30.735, lng: 31.800, r: 800 },
            { name: "مفارق الحسينية", lat: 30.850, lng: 31.910, r: 1000 }
        ];

        // إضافة الدوائر مع تأثير النبض (Pulse)
        spots.forEach(s => {
            L.circle([s.lat, s.lng], { color: '#ff4b2b', weight: 1, fillOpacity: 0.2, radius: s.r }).addTo(map);
            // الدائرة النابضة
            let p = L.circle([s.lat, s.lng], { className: 'pulse-circle', radius: s.r }).addTo(map);
        });

        let car = L.marker([30.55, 31.40]).addTo(map);
        let routeLine = L.polyline([], { color: '#00d2ff', weight: 4 }).addTo(map);
        let animationFrameId = null;

        function startSim(id) {
            dangerCount = 0;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            routeLine.setLatLngs([]);
            let seg = 0, progress = 0, speed = 0;
            const route = {
                belbeis: [[30.55, 31.40], [30.370580, 31.560652], [30.319318, 31.656503], [30.242886, 31.718091]],
                faqous: [[30.60, 31.70], [30.735, 31.800], [30.850, 31.910], [30.95, 32.00]]
            }[id];

            const animate = () => {
                if (seg >= route.length - 1) {
                    Swal.fire('تم الوصول!', 'اكتمل تتبع المسار بنجاح.', 'success');
                    return;
                }
                const start = route[seg], end = route[seg+1];
                const lat = start[0] + (end[0] - start[0]) * (progress / 350);
                const lng = start[1] + (end[1] - start[1]) * (progress / 350);
                car.setLatLng([lat, lng]);
                routeLine.addLatLng([lat, lng]);
                map.panTo([lat, lng], { animate: false });
                speed = updateSafety(lat, lng, speed);
                document.getElementById('spNum').innerText = Math.round(speed);
                progress++;
                if (progress > 350) { progress = 0; seg++; }
                animationFrameId = requestAnimationFrame(animate);
            };
            animate();
        }

        function updateSafety(lat, lng, currentSpeed) {
            let nearest = spots[0], minD = Infinity, isDanger = false;
            spots.forEach(s => {
                let d = map.distance([lat, lng], [s.lat, s.lng]);
                if (d < minD) { minD = d; nearest = s; }
                if (d < s.r) isDanger = true;
            });

            const distEl = document.getElementById('distNum');
            document.getElementById('locName').innerText = nearest.name;
            distEl.innerText = Math.round(minD) + " متر";

            // تغيير الألوان تفاعلياً حسب المسافة
            if (minD < 500) distEl.style.color = 'var(--danger)';
            else if (minD < 1200) distEl.style.color = 'var(--warning)';
            else distEl.style.color = 'var(--success)';

            if (isDanger) {
                dangerCount++;
                let now = Date.now();
                if (now - lastPlay > 4000) { alertAudio.play(); lastPlay = now; }
                document.body.classList.add('flash-red');
                return Math.max(40, currentSpeed - 0.5);
            } else {
                document.body.classList.remove('flash-red');
                return Math.min(115, currentSpeed + 0.3);
            }
        }

        function generateReport() {
            Swal.fire({
                title: 'تقرير تحليل الطريق',
                html: `
                    <div style="text-align:right; direction:rtl;">
                        <p><b>المحلل:</b> م/ أحمد هاني العطار</p>
                        <p><b>عدد النقاط الخطرة التي تم رصدها:</b> ${dangerCount > 0 ? '3 نقاط' : '0'}</p>
                        <p><b>حالة المسار:</b> ${dangerCount > 100 ? 'عالي الخطورة' : 'مستقر'}</p>
                        <hr>
                        <p style="font-size:0.8rem; color:gray;">تم استخراج هذا التقرير بناءً على التحليل المكاني لبيانات حوادث محافظة الشرقية.</p>
                    </div>
                `,
                icon: 'info',
                confirmButtonText: 'تحميل PDF (قريباً)',
                confirmButtonColor: '#00d2ff'
            });
        }
    </script>
</body>
</html>
